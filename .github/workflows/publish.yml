name: Publish

# Push a `v*` tag → build, test, publish to npm, create GitHub Release with
# auto-generated release notes from commits since the previous tag.
#
# Typical release flow for maintainers:
#
#     npm version patch    # bumps package.json, creates commit + tag
#     git push --follow-tags

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # required to create the GitHub Release
      id-token: write     # required for OIDC trusted publisher + provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history so the release notes generator
                          # can see the previous tag

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Trusted-publisher OIDC requires npm >= 11.5.1; Node 20 ships with npm 10.
      - name: Upgrade npm CLI
        run: npm install -g npm@latest

      # `--ignore-scripts` skips `prepare` (we build explicitly below).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Run unit tests
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
